services:
  match-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MATCH_NAME=Real Madrid vs Barcelona
      - ADMIN_SECRET=cambiar-esto-antes-de-clase
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Etiquetas para Coolify (las rellena Coolify automáticamente)
      - "coolify.managed=true"
